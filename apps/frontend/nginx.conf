server {
  listen 8080;
  root /usr/share/nginx/html;
  index index.html;

  # Docker embedded DNS: резолвим backend в рантайме, а не на старте.
  # Иначе nginx падает с "host not found in upstream", если сервис
  # ещё не зарегистрирован в DNS к моменту загрузки конфига.
  resolver 127.0.0.11 valid=10s ipv6=off;

  location /api/ {
    set $backend backend;
    proxy_pass http://$backend:3000$request_uri;
    proxy_set_header Host $host;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
